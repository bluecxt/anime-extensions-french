name: CI Alpha

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_CHUNK_SIZE: 65
  IS_PR_CHECK: false

jobs:
  prepare:
    permissions:
      contents: write
    name: Prepare job
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      latestCommitMessage: ${{ steps.set-env.outputs.LATEST_COMMIT_MESSAGE }}
      latestCommitHash: ${{ steps.set-env.outputs.LATEST_COMMIT_HASH }}
      matrix: ${{ steps.generate-matrices.outputs.matrix }}
      delete: ${{ steps.generate-matrices.outputs.delete }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set env
        id: set-env
        run: |
          LATEST_MSG=$(git log -1 --pretty=%s | tr -d '\"')
          LATEST_HASH=$(git log -1 --pretty=%H)
          echo "LATEST_COMMIT_MESSAGE=$LATEST_MSG" >> $GITHUB_OUTPUT
          echo "LATEST_COMMIT_HASH=$LATEST_HASH" >> $GITHUB_OUTPUT

      - id: generate-matrices
        name: Create output matrices
        run: |
          python3 ./.github/scripts/generate-build-matrices.py "all" Release

  build:
    name: Build extensions (${{ matrix.chunk.number }})
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ toJson(fromJson(needs.prepare.outputs.matrix).chunk) != '[]' }}
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref }}
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e
        with:
          cache-read-only: ${{ matrix.chunk.number > 1 }}

      - name: Clean up runner gradle.properties
        run: rm -f ~/.gradle/gradle.properties

      - name: Prepare signing key
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          if [ -n "$SIGNING_KEY" ]; then
            echo "$SIGNING_KEY" | base64 -d > signingkey.jks
            chmod 600 signingkey.jks
          fi

      - name: Build extensions (${{ matrix.chunk.number }})
        env:
          MODULES: ${{ join(matrix.chunk.modules, ' ') }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          TMDB_API: ${{ secrets.TMDB_API }}
        run: |
          ./gradlew $MODULES && ls src/*/*/build/outputs/apk/release/*.apk

      - name: Upload APKs (${{ matrix.chunk.number }})
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: "individual-apks-${{ matrix.chunk.number }}"
          path: "src/*/*/build/outputs/apk/release/*.apk"
          retention-days: 1

      - name: Clean up CI files
        run: rm -f signingkey.jks

  publish:
    name: Publish extension repo
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: ~/apk-artifacts

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 17
          distribution: temurin

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref }}
          persist-credentials: false

      - name: Checkout repo branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        continue-on-error: true
        with:
          ref: repo_alpha
          path: repo
          persist-credentials: false

      - name: Create repo artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.repository }}
        run: |
          mkdir -p repo
          python3 ./.github/scripts/move-built-apks.py
          INSPECTOR_LINK="$(curl -s -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/bluecxt/aniyomi-extensions-inspector/releases/latest" | jq -r '.assets[] | select(.name | endswith(".jar")) | .browser_download_url' | head -n 1)"

          if [ -z "$INSPECTOR_LINK" ] || [ "$INSPECTOR_LINK" = "null" ]; then
            echo "Error: Could not find Inspector.jar download link. Check GitHub API rate limits."
            exit 1
          fi

          curl -L "$INSPECTOR_LINK" -o ./Inspector.jar

          java -jar ./Inspector.jar "repo/apk" "output.json" "tmp"
          python3 ./.github/scripts/create-repo.py
          cp repo/index.min.json repo/index.json

          SAMPLE_APK=$(find repo/apk -name "*.apk" | head -n 1)
          if [ -n "$SAMPLE_APK" ]; then
            FINGERPRINT=$(keytool -printcert -jarfile "$SAMPLE_APK" | grep "SHA256:" | head -n 1 | awk -F': ' '{print $2}' | sed 's/://g' | tr '[:upper:]' '[:lower:]')
            REPO_ICON_URL="https://raw.githubusercontent.com/${REPO_NAME}/repo_alpha/icon.png"
            echo "{\"meta\":{\"name\":\"bluecxt french repo alpha\",\"shortName\":\"BCXT-FR-ALPHA\",\"website\":\"https://github.com/bluecxt/anime-extensions-french\",\"signingKeyFingerprint\":\"$FINGERPRINT\",\"iconUrl\":\"$REPO_ICON_URL\"}}" > repo/repo.json
            echo "Successfully generated repo.json with name: bluecxt french repo alpha"
          else
            echo "Error: No APK found to extract fingerprint!"
            exit 1
          fi

          sudo apt-get update && sudo apt-get install -y librsvg2-bin
          rsvg-convert -w 512 -h 512 repo_logo.svg -o repo/icon.png
          cp repo/icon.png repo/logo.png

      - name: Deploy to repo branch
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f
        with:
          branch: repo_alpha
          folder: repo
          clean: true
          commit-message: "Update extension repo alpha: ${{ needs.prepare.outputs.latestCommitMessage }} (${{ needs.prepare.outputs.latestCommitHash }})"
