name: CI

on:
  push:
    branches:
      - main
    paths:
      - "**"
      - "!**.md"
      - "!.github/**"
      - ".github/scripts/**"
      - ".github/workflows/build_push.yml"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_CHUNK_SIZE: 65
  IS_PR_CHECK: false

jobs:
  prepare:
    permissions:
      contents: write
    name: Prepare job
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      latestCommitMessage: ${{ steps.set-env.outputs.LATEST_COMMIT_MESSAGE }}
      latestCommitHash: ${{ steps.set-env.outputs.LATEST_COMMIT_HASH }}
      matrix: ${{ steps.generate-matrices.outputs.matrix }}
      delete: ${{ steps.generate-matrices.outputs.delete }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check Core/Lib changes and bump versions
        id: bump-check
        run: |
          COMMIT_COUNT=$(jq '.commits | length' "$GITHUB_EVENT_PATH" 2>/dev/null || echo "0")

          if [ "$COMMIT_COUNT" -gt 0 ]; then
            BASE_COMMIT="HEAD~$COMMIT_COUNT"
          else
            BASE_COMMIT="${{ github.event.before }}"
            if [ "$BASE_COMMIT" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE_COMMIT" ]; then
              BASE_COMMIT="HEAD~1"
            fi
          fi

          echo "[+] Analyse globale de l'historique ($BASE_COMMIT -> HEAD) contenant $COMMIT_COUNT commit(s)..."

          if git diff --name-only $BASE_COMMIT HEAD | grep -E '^(src/fr/bluecxt/core/|lib/)'; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"

            python bump_versions.py

            git add src/
            if ! git diff-index --quiet HEAD --; then
              git commit -m "[CI] Auto-bump extension versions due to Core/Lib updates"
              git push origin main
            fi
          fi

      - name: Set env
        id: set-env
        run: |
          echo "LATEST_COMMIT_MESSAGE=$(git log -1 --pretty=%s | tr -d '\"')" >> $GITHUB_OUTPUT
          echo "LATEST_COMMIT_HASH=$(git log -1 --pretty=%H)" >> $GITHUB_OUTPUT

      - id: generate-matrices
        name: Create output matrices
        run: |
          BASE_COMMIT="${{ github.event.before }}"
          if [ "$BASE_COMMIT" = "0000000000000000000000000000000000000000" ]; then
            BASE_COMMIT="HEAD~1"
          fi
          python ./.github/scripts/generate-build-matrices.py "$BASE_COMMIT" Release

  build:
    name: Build extensions (${{ matrix.chunk.number }})
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ toJson(fromJson(needs.prepare.outputs.matrix).chunk) != '[]' }}
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ matrix.chunk.number > 1 }}

      - name: Prepare signing key
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          echo "$SIGNING_KEY" | base64 -d > signingkey.jks
          chmod 600 signingkey.jks

      - name: Build extensions (${{ matrix.chunk.number }})
        env:
          MODULES: ${{ join(matrix.chunk.modules, ' ') }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          TMDB_API: ${{ secrets.TMDB_API }}
        run: |
          ./gradlew $MODULES

      - name: Upload APKs (${{ matrix.chunk.number }})
        uses: actions/upload-artifact@v7
        with:
          name: "individual-apks-${{ matrix.chunk.number }}"
          path: "**/*.apk"
          retention-days: 1

      - name: Clean up CI files
        run: rm signingkey.jks

  publish:
    name: Publish extension repo
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v8
        with:
          path: ~/apk-artifacts

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Checkout repo branch
        uses: actions/checkout@v6
        with:
          ref: repo
          path: repo

      - name: Create repo artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python ./.github/scripts/move-built-apks.py
          INSPECTOR_LINK="$(curl -s -H "Authorization: token $GITHUB_TOKEN" "https://api.github.com/repos/bluecxt/aniyomi-extensions-inspector/releases/latest" | jq -r '.assets[] | select(.name | endswith(".jar")) | .browser_download_url' | head -n 1)"

          if [ -z "$INSPECTOR_LINK" ] || [ "$INSPECTOR_LINK" = "null" ]; then
            echo "Error: Could not find Inspector.jar download link. Check GitHub API rate limits."
            exit 1
          fi

          curl -L "$INSPECTOR_LINK" -o ./Inspector.jar

          java -jar ./Inspector.jar "repo/apk" "output.json" "tmp"
          python ./.github/scripts/create-repo.py
          cp repo/index.min.json repo/index.json

          SAMPLE_APK=$(find repo/apk -name "*.apk" | head -n 1)
          if [ -n "$SAMPLE_APK" ]; then
            FINGERPRINT=$(keytool -printcert -jarfile "$SAMPLE_APK" | grep "SHA256:" | head -n 1 | awk -F': ' '{print $2}' | sed 's/://g' | tr '[:upper:]' '[:lower:]')
            REPO_ICON_URL="https://raw.githubusercontent.com/${{ github.repository }}/repo/icon.png"
            echo "{\"meta\":{\"name\":\"bluecxt french repo\",\"shortName\":\"BCXT-FR\",\"website\":\"https://github.com/bluecxt/anime-extensions-french\",\"signingKeyFingerprint\":\"$FINGERPRINT\",\"iconUrl\":\"$REPO_ICON_URL\"}}" > repo/repo.json
            echo "Successfully generated repo.json with name: bluecxt french repo"
          else
            echo "Error: No APK found to extract fingerprint!"
            exit 1
          fi

          sudo apt-get update && sudo apt-get install -y librsvg2-bin
          rsvg-convert -w 512 -h 512 repo_logo.svg -o repo/icon.png
          cp repo/icon.png repo/logo.png

      - name: Deploy to repo branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: repo
          folder: repo
          clean: true
          commit-message: "Update extension repo: ${{ needs.prepare.outputs.latestCommitMessage }} (${{ needs.prepare.outputs.latestCommitHash }})"
